<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿CUÁNTO SABÉS DE TINI?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --violet: #7B6FFF;
    --blue: #4B8FFF;
    --cyan: #00C8FF;
    --deep: #06040f;
    --dark: #0a0818;
    --ice: #E8E0FF;
    --white: #FFFFFF;
    --metal: #B8B0CC;
    --glow-v: 0 0 20px rgba(123,111,255,0.5), 0 0 50px rgba(123,111,255,0.2);
    --glow-strong: 0 0 30px rgba(123,111,255,0.8), 0 0 80px rgba(0,200,255,0.3);
  }

  html, body {
    width: 100%; min-height: 100%;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(107,95,255,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(75,143,255,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(123,111,255,0.08) 0%, transparent 50%),
      #06040f;
    font-family: 'Poppins', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* CSS star field */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(220,210,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(220,210,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, rgba(220,210,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(220,210,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 25%, rgba(220,210,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 80%, rgba(220,210,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, rgba(220,210,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 70%, rgba(220,210,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 85%, rgba(220,210,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(220,210,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(220,210,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 95% 10%, rgba(220,210,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 35%, rgba(180,160,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, rgba(180,160,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(200,190,255,0.5) 0%, transparent 100%);
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    transition: opacity 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── PORTAL RINGS ── */
  .portal-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(123,111,255,0.25);
    animation: portalPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  .portal-ring:nth-child(1) { width: 280px; height: 280px; animation-delay: 0s; }
  .portal-ring:nth-child(2) { width: 400px; height: 400px; animation-delay: 0.6s; opacity: 0.6; }
  .portal-ring:nth-child(3) { width: 540px; height: 540px; animation-delay: 1.2s; opacity: 0.3; }
  @keyframes portalPulse {
    0%,100% { transform: scale(1); border-color: rgba(123,111,255,0.25); }
    50%      { transform: scale(1.03); border-color: rgba(123,111,255,0.55); box-shadow: 0 0 30px rgba(123,111,255,0.1); }
  }

  /* ── WELCOME ── */
  .welcome-content { position: relative; z-index: 2; text-align: center; animation: fadeInUp 1s ease both; }

  .welcome-logo {
    width: clamp(260px, 55vw, 580px); height: auto;
    display: block; margin: 0 auto 0.5rem;
  }

  .welcome-tag {
    font-size: 0.6rem; letter-spacing: 0.5em; color: var(--violet);
    text-transform: uppercase; margin-bottom: 1.2rem; opacity: 0.8;
  }

  .quiz-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.7rem, 5vw, 3.2rem);
    font-weight: 500; letter-spacing: 0.18em; line-height: 1.1;
    color: var(--white);
    text-shadow: var(--glow-strong);
    animation: titleGlow 3s ease-in-out infinite alternate;
    margin-bottom: 1rem;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(123,111,255,0.6), 0 0 50px rgba(123,111,255,0.2); }
    to   { text-shadow: 0 0 40px rgba(123,111,255,1), 0 0 90px rgba(0,200,255,0.3); }
  }

  .welcome-sub {
    font-size: 0.85rem; font-weight: 300; letter-spacing: 0.08em;
    color: var(--ice); max-width: 440px; margin: 0 auto 2.5rem;
    line-height: 1.7; opacity: 0.8;
  }

  .deco-line {
    width: 100px; height: 1px;
    background: linear-gradient(90deg, transparent, #7B6FFF, #00C8FF, transparent);
    margin: 1.2rem auto; box-shadow: 0 0 8px #7B6FFF;
  }

  /* ── BUTTON ── */
  .btn-primary {
    display: inline-block; font-family: 'Poppins', sans-serif; font-weight: 600;
    font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--white); background: linear-gradient(135deg, #6B5FFF 0%, #4B8FFF 100%);
    padding: 1rem 3.5rem; border: none; cursor: pointer; position: relative; overflow: hidden;
    border-radius: 100px; border: 1px solid rgba(160,140,255,0.4);
    transition: all 0.35s ease;
    box-shadow: 0 0 22px rgba(107,95,255,0.5), 0 4px 24px rgba(75,143,255,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-primary::before {
    content: ''; position: absolute; inset: 0; border-radius: 100px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: translateX(-100%); transition: transform 0.55s ease;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #7B6FFF 0%, #5B9FFF 100%);
    box-shadow: 0 0 40px rgba(107,95,255,0.75), 0 0 80px rgba(75,143,255,0.3);
    transform: translateY(-3px); border-color: rgba(180,160,255,0.6);
  }
  .btn-primary:hover::before { transform: translateX(100%); }
  .btn-primary:active { transform: translateY(-1px); }

  /* ── QUIZ SCREEN ── */
  #screen-quiz { justify-content: center; padding: 2rem; overflow-y: auto; }

  .quiz-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 680px;
    margin: auto;
    transition: opacity 0.2s ease;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem;
  }
  .progress-track {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7B6FFF, #00C8FF);
    box-shadow: 0 0 10px #7B6FFF;
    border-radius: 2px; transition: width 0.5s ease;
  }
  .progress-label {
    font-size: 0.6rem; letter-spacing: 0.3em; color: var(--metal);
    white-space: nowrap; text-transform: uppercase;
  }

  /* Question card */
  .question-card {
    background: rgba(123,111,255,0.06);
    border: 1px solid rgba(123,111,255,0.2);
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    backdrop-filter: blur(10px);
    margin-bottom: 1.5rem;
    box-shadow: 0 0 40px rgba(123,111,255,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .question-num {
    font-size: 0.58rem; letter-spacing: 0.4em; color: var(--violet);
    text-transform: uppercase; margin-bottom: 1rem; opacity: 0.8;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 400; letter-spacing: 0.06em; line-height: 1.4;
    color: var(--white); margin-bottom: 0;
  }

  /* Answer options */
  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.85rem;
  }

  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr; }
    .question-card { padding: 1.8rem 1.4rem; }
  }

  .option-btn {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.2rem; border-radius: 14px; cursor: pointer;
    border: 1px solid rgba(123,111,255,0.2);
    background: rgba(123,111,255,0.05);
    transition: all 0.2s ease; text-align: left;
    font-family: 'Poppins', sans-serif;
    position: relative; overflow: hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color: rgba(123,111,255,0.5);
    background: rgba(123,111,255,0.12);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(123,111,255,0.15);
  }
  .option-btn:disabled { cursor: default; }

  .option-letter {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(123,111,255,0.15);
    border: 1px solid rgba(123,111,255,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 400; letter-spacing: 0.05em;
    color: var(--violet); flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .option-text {
    font-size: 0.82rem; line-height: 1.4; color: var(--ice); font-weight: 400;
  }

  /* Correct / Wrong states */
  .option-btn.correct {
    border-color: #4ADE80;
    background: rgba(74,222,128,0.12);
    box-shadow: 0 0 20px rgba(74,222,128,0.2);
    animation: correctPulse 0.4s ease;
  }
  .option-btn.correct .option-letter {
    background: rgba(74,222,128,0.2);
    border-color: #4ADE80; color: #4ADE80;
  }
  .option-btn.correct .option-text { color: #4ADE80; }

  .option-btn.wrong {
    border-color: #FF4466;
    background: rgba(255,68,102,0.1);
    box-shadow: 0 0 20px rgba(255,68,102,0.15);
    animation: wrongShake 0.4s ease;
  }
  .option-btn.wrong .option-letter {
    background: rgba(255,68,102,0.15);
    border-color: #FF4466; color: #FF4466;
  }
  .option-btn.wrong .option-text { color: rgba(255,68,102,0.8); }

  .option-btn.reveal-correct {
    border-color: rgba(74,222,128,0.4);
    background: rgba(74,222,128,0.06);
  }
  .option-btn.reveal-correct .option-letter { border-color: rgba(74,222,128,0.5); color: rgba(74,222,128,0.7); }

  @keyframes correctPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    60%     { transform: translateX(6px); }
  }

  /* Feedback bar */
  .feedback-bar {
    height: 48px; display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; letter-spacing: 0.15em; font-weight: 600;
    border-radius: 12px; margin-bottom: 1rem;
    transition: all 0.3s ease; opacity: 0;
  }
  .feedback-bar.show { opacity: 1; }
  .feedback-bar.correct { background: rgba(74,222,128,0.1); color: #4ADE80; border: 1px solid rgba(74,222,128,0.3); }
  .feedback-bar.wrong   { background: rgba(255,68,102,0.1); color: #FF4466; border: 1px solid rgba(255,68,102,0.3); }

  /* ── RESULT SCREEN ── */
  .result-content {
    position: relative; z-index: 2; text-align: center;
    animation: fadeInUp 0.8s ease both; max-width: 600px;
  }

  .result-tag { font-size: 0.6rem; letter-spacing: 0.5em; color: var(--violet); text-transform: uppercase; margin-bottom: 1.2rem; }

  .result-score-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 500; line-height: 1;
    color: var(--white);
    text-shadow: var(--glow-strong);
    margin-bottom: 0.3rem;
    animation: titleGlow 2s ease-in-out infinite alternate;
  }
  .result-score-label {
    font-size: 0.65rem; letter-spacing: 0.3em; color: var(--metal); margin-bottom: 1.5rem; text-transform: uppercase;
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 3.5vw, 2.2rem);
    font-weight: 400; letter-spacing: 0.15em; line-height: 1.2;
    margin-bottom: 1rem; color: var(--white);
    animation: titleGlow 2s ease-in-out infinite alternate;
  }
  .result-msg {
    font-size: 0.85rem; letter-spacing: 0.06em; color: var(--ice);
    max-width: 420px; margin: 0 auto 2rem; line-height: 1.7; opacity: 0.8;
  }

  /* Stars row on perfect score */
  .stars-row {
    display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .star-icon {
    font-size: 1.5rem; animation: starPop 0.4s ease both;
    text-shadow: 0 0 15px rgba(123,111,255,0.8);
  }
  .star-icon:nth-child(1) { animation-delay: 0.1s; }
  .star-icon:nth-child(2) { animation-delay: 0.2s; }
  .star-icon:nth-child(3) { animation-delay: 0.3s; }
  .star-icon:nth-child(4) { animation-delay: 0.4s; }
  .star-icon:nth-child(5) { animation-delay: 0.5s; }
  @keyframes starPop {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    70%  { transform: scale(1.3) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Confetti */
  #confetti-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── ANIMATIONS ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Question transition handled via JS inline styles */
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- ═══════ WELCOME ═══════ -->
<div id="screen-welcome" class="screen">
  <div class="portal-ring"></div>
  <div class="portal-ring"></div>
  <div class="portal-ring"></div>
  <div class="welcome-content">
    <div class="welcome-tag">Activación Oficial · FUTTTURA TOUR</div>
    <img src="./futttura-logo.png" alt="FUTTTURA" class="welcome-logo">
    <div class="deco-line"></div>
    <div class="quiz-title">¿CUÁNTO SABÉS DE TINI?</div>
    <p class="welcome-sub">Poné a prueba tus conocimientos y descubrí si sos una verdadera fan</p>
    <button class="btn-primary" id="btn-start">COMENZAR</button>
  </div>
</div>

<!-- ═══════ QUIZ ═══════ -->
<div id="screen-quiz" class="screen hidden">
  <div class="quiz-wrap" id="quiz-wrap">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">1 / 5</div>
    </div>
    <div class="question-card">
      <div class="question-num" id="question-num">Pregunta 1</div>
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="feedback-bar" id="feedback-bar"></div>
    <div class="options-grid" id="options-grid"></div>
  </div>
</div>

<!-- ═══════ RESULT ═══════ -->
<div id="screen-result" class="screen hidden">
  <div class="portal-ring"></div>
  <div class="portal-ring"></div>
  <div class="result-content">
    <div class="result-tag" id="result-tag">Resultado</div>
    <div class="result-score-display" id="result-score-display">0</div>
    <div class="result-score-label">respuestas correctas de 5</div>
    <div class="stars-row" id="stars-row"></div>
    <div class="deco-line"></div>
    <div class="result-title" id="result-title"></div>
    <p class="result-msg" id="result-msg"></p>
    <button class="btn-primary" id="btn-replay">VOLVER A JUGAR</button>
  </div>
</div>

<script>
// ── QUESTIONS ──
const QUESTIONS = [
  {
    q: '¿Cuál fue la primera canción de Tini?',
    opts: ['Siempre Brillarás','Quiero Volver','Great Escape','Si Tú Te Vas'],
    correct: 0
  },
  {
    q: '¿Cuándo nació Tini?',
    opts: ['20 de abril, 2000','16 de junio, 1997','21 de marzo, 1997','20 de marzo, 1997'],
    correct: 2
  },
  {
    q: '¿En qué serie debutó Tini?',
    opts: ['Violetta','Floricienta','Soy Luna','Patito Feo'],
    correct: 3
  },
  {
    q: '¿Cuántos álbumes tiene Tini?',
    opts: ['7','10','5','3'],
    correct: 0
  },
  {
    q: '¿Qué es FUTTTURA?',
    opts: ['Un álbum','Una canción','Un show que recorre todas las etapas de su carrera','Una película'],
    correct: 2
  }
];

const LETTERS = ['A','B','C','D'];

// ── STATE ──
let current = 0, score = 0, answered = false;

// ── UTILS ──
const $ = id => document.getElementById(id);

function showScreen(id){
  ['screen-welcome','screen-quiz','screen-result'].forEach(s => $(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
}

// ── AUDIO ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, type, dur, gain=0.2, delay=0){
  setTimeout(()=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(gain,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  }, delay);
}
function sfxCorrect(){ tone(660,'sine',0.12,0.18); tone(880,'sine',0.2,0.14,80); tone(1100,'sine',0.25,0.1,160); }
function sfxWrong()  { tone(220,'sawtooth',0.18,0.15); tone(180,'sawtooth',0.12,0.1,100); }
function sfxWin()    { [523,659,784,987,1047].forEach((f,i)=>tone(f,'sine',0.35,0.18,i*90)); }
function sfxStart()  { tone(440,'sine',0.1,0.18); tone(880,'sine',0.2,0.12,80); tone(1320,'sine',0.25,0.08,170); }

// ── CONFETTI ──
const confCanvas = $('confetti-canvas');
const confCtx = confCanvas.getContext('2d');
let confParts=[], confRunning=false;

function startConfetti(){
  confCanvas.width=window.innerWidth; confCanvas.height=window.innerHeight;
  confRunning=true;
  confParts=Array.from({length:150},()=>({
    x:Math.random()*confCanvas.width, y:-20,
    vx:(Math.random()-0.5)*3.5, vy:1.5+Math.random()*3,
    size:4+Math.random()*9, rot:Math.random()*360, rotV:(Math.random()-0.5)*7,
    color:['#7B6FFF','#00C8FF','#E8E0FF','#4B8FFF','#FFFFFF','#B8B0FF','#A78BFF'][Math.floor(Math.random()*7)]
  }));
  animateConf();
}
function stopConfetti(){ confRunning=false; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }
function animateConf(){
  if(!confRunning) return;
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
    confCtx.save();
    confCtx.translate(p.x+p.size/2, p.y+p.size/2);
    confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color;
    confCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size/2);
    confCtx.restore();
  });
  confParts=confParts.filter(p=>p.y<confCanvas.height+50);
  if(confParts.length<40){
    confParts.push(...Array.from({length:50},()=>({
      x:Math.random()*confCanvas.width, y:-20,
      vx:(Math.random()-0.5)*3.5, vy:1.5+Math.random()*3,
      size:4+Math.random()*9, rot:Math.random()*360, rotV:(Math.random()-0.5)*7,
      color:['#7B6FFF','#00C8FF','#E8E0FF','#4B8FFF','#FFFFFF','#B8B0FF','#A78BFF'][Math.floor(Math.random()*7)]
    })));
  }
  requestAnimationFrame(animateConf);
}

// ── RENDER QUESTION ──
function renderQuestion(){
  answered = false;
  const q = QUESTIONS[current];
  const wrap = $('quiz-wrap');

  // progress
  const pct = (current / QUESTIONS.length) * 100;
  $('progress-fill').style.width = pct + '%';
  $('progress-label').textContent = `${current+1} / ${QUESTIONS.length}`;
  $('question-num').textContent = `Pregunta ${current+1}`;
  $('question-text').textContent = q.q;

  // hide feedback
  const fb = $('feedback-bar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  // options
  const grid = $('options-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="option-letter">${LETTERS[i]}</div><div class="option-text">${opt}</div>`;
    btn.addEventListener('click', () => selectAnswer(i, btn));
    grid.appendChild(btn);
  });

  // clear any leftover opacity from transition
  // (transition back to full opacity is handled by selectAnswer)
}

// ── SELECT ANSWER ──
function selectAnswer(idx, btn){
  if(answered) return;
  answered = true;
  AC.resume();

  const q = QUESTIONS[current];
  const isCorrect = idx === q.correct;
  const allBtns = $('options-grid').querySelectorAll('.option-btn');

  // Disable all
  allBtns.forEach(b => b.disabled = true);

  // Mark selected
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  // Reveal correct if wrong
  if(!isCorrect){
    allBtns[q.correct].classList.add('reveal-correct');
  }

  // Feedback bar
  const fb = $('feedback-bar');
  if(isCorrect){
    fb.textContent = '✦ ¡CORRECTO! ✦';
    fb.className = 'feedback-bar correct show';
    sfxCorrect();
    score++;
  } else {
    fb.textContent = '✗  Incorrecto';
    fb.className = 'feedback-bar wrong show';
    sfxWrong();
  }

  // Advance after delay
  setTimeout(() => {
    current++;
    const wrap = $('quiz-wrap');
    if(current < QUESTIONS.length){
      // Fade out
      wrap.style.transition = 'opacity 0.2s ease';
      wrap.style.opacity = '0';
      // Wait for fade out, then swap content and fade in
      setTimeout(() => {
        renderQuestion();
        // Small delay to let DOM update before fading in
        setTimeout(() => {
          wrap.style.opacity = '1';
        }, 30);
      }, 220);
    } else {
      showResult();
    }
  }, 1400);
}

// ── SHOW RESULT ──
function showResult(){
  $('progress-fill').style.width = '100%';
  showScreen('screen-result');

  $('result-score-display').textContent = score;

  // Stars
  const starsRow = $('stars-row');
  starsRow.innerHTML = '';
  for(let i=0;i<5;i++){
    const s = document.createElement('span');
    s.className = 'star-icon';
    s.textContent = i < score ? '★' : '☆';
    s.style.color = i < score ? '#7B6FFF' : 'rgba(255,255,255,0.15)';
    starsRow.appendChild(s);
  }

  let title, msg, tag;
  if(score <= 2){
    tag = '— Seguí Explorando —';
    title = 'ESTÁS DESCUBRIENDO EL UNIVERSO TINISTA';
    msg = 'Seguí explorando sus eras y volvé a intentarlo.';
  } else if(score <= 4){
    tag = '✦ ¡Muy Bien! ✦';
    title = '¡MUY BIEN!';
    msg = 'Conocés gran parte de la historia de Tini.';
  } else {
    tag = '✦ ¡Perfecto! ✦';
    title = '¡SOS UNA VERDADERA TINISTA!';
    msg = 'Completaste el recorrido FUTTTURA! Ya podes reclamar tu premio en el Stand.';
    sfxWin();
    startConfetti();
  }

  $('result-tag').textContent = tag;
  $('result-title').textContent = title;
  $('result-msg').textContent = msg;
}

// ── START / REPLAY ──
function startQuiz(){
  current = 0; score = 0;
  stopConfetti();
  showScreen('screen-quiz');
  renderQuestion();
}

$('btn-start').addEventListener('click', () => { AC.resume(); sfxStart(); startQuiz(); });
$('btn-replay').addEventListener('click', () => { AC.resume(); stopConfetti(); startQuiz(); });
</script>
